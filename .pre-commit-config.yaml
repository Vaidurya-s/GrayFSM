# Pre-commit hooks for grayFSM.
#
# Install once per clone:
#     pip install pre-commit
#     pre-commit install
#
# To run against the whole repo on demand:
#     pre-commit run --all-files
#
# The gitleaks hook scans staged content for credentials, API keys, and
# private keys before they hit a commit. The other hooks catch common
# hygiene issues (trailing whitespace, oversized files, merge markers).
repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=1024]
      - id: check-yaml
        # Allow Helm/k8s template-style YAML with custom tags.
        args: [--allow-multiple-documents]
        # Skip files known to use non-standard YAML constructs.
        exclude: ^infrastructure/kubernetes/.*\.yaml$
      - id: check-json
      - id: detect-private-key
      - id: detect-aws-credentials
        args: [--allow-missing-credentials]

  # Ruff lints + formats Python in backend/. --fix auto-applies safe
  # corrections; ruff-format is the modern replacement for black and is
  # used here because pyproject.toml already configures ruff.
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        files: ^backend/
        exclude: ^backend/(alembic/versions/|venv/)
      - id: ruff-format
        files: ^backend/
        exclude: ^backend/(alembic/versions/|venv/)

  # Frontend formatting via Prettier.
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        files: ^frontend/src/.*\.(ts|tsx|js|jsx|css|json|md)$
        additional_dependencies:
          - prettier@^3.1.1

  # mypy type-checks the Python backend. Uses the venv interpreter so
  # installed stubs are available. Requires `pip install pre-commit` and
  # `pre-commit install` inside backend/venv (or globally).
  - repo: local
    hooks:
      - id: mypy
        name: mypy (backend)
        language: system
        entry: backend/venv/bin/mypy
        args: [--ignore-missing-imports, --config-file=backend/pyproject.toml]
        files: ^backend/app/.*\.py$
        exclude: ^backend/(alembic/versions/|venv/)
        pass_filenames: false
        always_run: false

  # ESLint type/lint check for the frontend TypeScript sources.
  - repo: local
    hooks:
      - id: eslint
        name: eslint (frontend)
        language: system
        entry: frontend/node_modules/.bin/eslint
        args: [--ext, "ts,tsx", --max-warnings, "3"]
        files: ^frontend/src/.*\.(ts|tsx)$
        pass_filenames: true
