[pytest]
# Pytest configuration for GrayFSM tests

minversion = 7.0
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers
markers =
    contract: Contract tests validating OpenAPI compliance
    integration: Integration tests with real database
    load: Load and performance tests
    slow: Slow running tests (> 5 seconds)
    database: Tests requiring database
    redis: Tests requiring Redis
    asyncio: Async tests

# Asyncio configuration
asyncio_mode = auto

# Output options
addopts =
    --verbose
    --strict-markers
    --tb=short
    --disable-warnings
    -ra
    --color=yes

# Coverage options
[coverage:run]
source = backend/app
omit =
    */tests/*
    */migrations/*
    */venv/*
    */__init__.py

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

[coverage:html]
directory = htmlcov
