---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: grayfsm-monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
      external_labels:
        cluster: 'grayfsm-prod'
        environment: 'production'

    # Alerting configuration
    alerting:
      alertmanagers:
      - static_configs:
        - targets:
          - alertmanager:9093

    rule_files:
      - '/etc/prometheus/rules/*.yml'

    scrape_configs:
      # Prometheus itself
      - job_name: 'prometheus'
        scrape_interval: 5s
        static_configs:
          - targets: ['localhost:9090']

      # Kubernetes API server
      - job_name: 'kubernetes-apiservers'
        kubernetes_sd_configs:
          - role: endpoints
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        relabel_configs:
          - source_labels: [__meta_kubernetes_namespace, __meta_kubernetes_service_name, __meta_kubernetes_endpoint_port_name]
            action: keep
            regex: default;kubernetes;https

      # Kubernetes nodes
      - job_name: 'kubernetes-nodes'
        kubernetes_sd_configs:
          - role: node
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)

      # Kubernetes pods
      - job_name: 'kubernetes-pods'
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: 'true'
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - action: labelmap
            regex: __meta_kubernetes_pod_label_(.+)
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: kubernetes_namespace
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: kubernetes_pod_name

      # GrayFSM Backend
      - job_name: 'grayfsm-backend'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - grayfsm
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: 'grayfsm'
          - source_labels: [__meta_kubernetes_pod_label_component]
            action: keep
            regex: 'backend'
          - source_labels: [__meta_kubernetes_pod_container_port_number]
            action: keep
            regex: '8000'
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: pod
          - source_labels: [__meta_kubernetes_pod_label_slot]
            action: replace
            target_label: slot

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-rules
  namespace: grayfsm-monitoring
data:
  alert-rules.yml: |
    groups:
    - name: grayfsm-alerts
      interval: 30s
      rules:
      # Backend alerts
      - alert: BackendHighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.05
        for: 5m
        labels:
          severity: critical
          component: backend
        annotations:
          summary: "High error rate detected in backend"
          description: "Backend error rate is {{ $value | humanizePercentage }} over 5 minutes"

      - alert: BackendHighLatency
        expr: histogram_quantile(0.95, http_request_duration_seconds_bucket) > 1
        for: 5m
        labels:
          severity: warning
          component: backend
        annotations:
          summary: "High latency detected in backend"
          description: "Backend p95 latency is {{ $value | humanizeDuration }}"

      - alert: BackendPodCrashing
        expr: rate(container_last_seen{pod=~"grayfsm-backend.*"}[5m]) == 0
        for: 5m
        labels:
          severity: critical
          component: backend
        annotations:
          summary: "Backend pod is crashing"
          description: "Backend pod {{ $labels.pod }} appears to be crashing"

      - alert: BackendHighMemoryUsage
        expr: |
          (container_memory_working_set_bytes{pod=~"grayfsm-backend.*"} /
           container_spec_memory_limit_bytes{pod=~"grayfsm-backend.*"}) > 0.85
        for: 5m
        labels:
          severity: warning
          component: backend
        annotations:
          summary: "High memory usage in backend"
          description: "Memory usage is {{ $value | humanizePercentage }}"

      - alert: BackendHighCPUUsage
        expr: |
          (rate(container_cpu_usage_seconds_total{pod=~"grayfsm-backend.*"}[5m]) *
           100) > 80
        for: 5m
        labels:
          severity: warning
          component: backend
        annotations:
          summary: "High CPU usage in backend"
          description: "CPU usage is {{ $value }}%"

      # Database alerts
      - alert: DatabaseConnectionPoolExhausted
        expr: pg_connections_active / pg_connections_max > 0.8
        for: 5m
        labels:
          severity: critical
          component: database
        annotations:
          summary: "Database connection pool near capacity"
          description: "Active connections: {{ $value | humanizePercentage }}"

      - alert: DatabaseSlowQueries
        expr: rate(pg_stat_statements_mean_exec_time[5m]) > 1000
        for: 5m
        labels:
          severity: warning
          component: database
        annotations:
          summary: "Slow queries detected"
          description: "Average query time: {{ $value }}ms"

      - alert: DatabaseDiskSpaceLow
        expr: pg_database_size_bytes / node_filesystem_size_bytes < 0.1
        for: 5m
        labels:
          severity: critical
          component: database
        annotations:
          summary: "Database disk space running low"
          description: "Available disk space: {{ $value | humanizePercentage }}"

      # Frontend alerts
      - alert: FrontendHighErrorRate
        expr: rate(http_requests_total{job="grayfsm-frontend", status=~"5.."}[5m]) > 0.01
        for: 5m
        labels:
          severity: warning
          component: frontend
        annotations:
          summary: "High error rate in frontend"
          description: "Frontend error rate: {{ $value | humanizePercentage }}"

      # General infrastructure alerts
      - alert: NodeNotReady
        expr: kube_node_status_condition{condition="Ready", status="true"} == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Kubernetes node is not ready"
          description: "Node {{ $labels.node }} is not ready"

      - alert: PersistentVolumeSpaceLow
        expr: |
          (kubelet_volume_stats_available_bytes / kubelet_volume_stats_capacity_bytes) < 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "PV space running low"
          description: "PV {{ $labels.persistentvolumeclaim }} space: {{ $value | humanizePercentage }}"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: grayfsm-monitoring
  labels:
    app: prometheus
spec:
  replicas: 2
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      serviceAccountName: prometheus
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534
      containers:
      - name: prometheus
        image: prom/prometheus:latest
        args:
          - '--config.file=/etc/prometheus/prometheus.yml'
          - '--storage.tsdb.path=/prometheus'
          - '--storage.tsdb.retention.time=15d'
          - '--web.enable-lifecycle'
        ports:
        - containerPort: 9090
          name: web
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        volumeMounts:
        - name: config
          mountPath: /etc/prometheus
        - name: rules
          mountPath: /etc/prometheus/rules
        - name: storage
          mountPath: /prometheus
      volumes:
      - name: config
        configMap:
          name: prometheus-config
      - name: rules
        configMap:
          name: prometheus-rules
      - name: storage
        emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: grayfsm-monitoring
spec:
  type: ClusterIP
  selector:
    app: prometheus
  ports:
  - port: 9090
    targetPort: web

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: grayfsm-monitoring

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus
spec:
  rules:
  - apiGroups: [""]
    resources:
    - nodes
    - nodes/proxy
    - services
    - endpoints
    - pods
    verbs: ["get", "list", "watch"]
  - nonResourceURLs: ["/metrics"]
    verbs: ["get"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: prometheus
subjects:
- kind: ServiceAccount
  name: prometheus
  namespace: grayfsm-monitoring
