---
# WARNING: This file contains PLACEHOLDER secrets only.
# In production, use Sealed Secrets, External Secrets Operator, or HashiCorp Vault.
# NEVER commit real credentials to version control.
#
# Secret template - use with sealed-secrets or external-secrets operator
# For production, use one of the following approaches:
# 1. Sealed Secrets: https://sealed-secrets.netlify.app/
# 2. External Secrets Operator: https://external-secrets.io/
# 3. Vault integration: https://www.vaultproject.io/

apiVersion: v1
kind: Secret
metadata:
  name: grayfsm-secrets-dev
  namespace: grayfsm
  labels:
    app: grayfsm
    environment: development
type: Opaque
stringData:
  DATABASE_URL: "postgresql+asyncpg://grayfsm:devpass@postgres:5432/grayfsm_dev"
  REDIS_URL: "redis://:devpass@redis:6379/0"
  SENTRY_DSN: "https://examplePublicKey@o0.ingest.sentry.io/0"
  JWT_SECRET_KEY: "dev-secret-key-change-in-production"
  API_KEY: "dev-api-key"

---
apiVersion: v1
kind: Secret
metadata:
  name: grayfsm-secrets-staging
  namespace: grayfsm
  labels:
    app: grayfsm
    environment: staging
type: Opaque
stringData:
  DATABASE_URL: "postgresql+asyncpg://grayfsm:STAGING_PASSWORD@postgres.staging.internal:5432/grayfsm_staging"
  REDIS_URL: "redis://:STAGING_REDIS_PASSWORD@redis.staging.internal:6379/0"
  SENTRY_DSN: "https://staging-sentry-key@o0.ingest.sentry.io/staging-id"
  JWT_SECRET_KEY: "staging-jwt-secret"
  API_KEY: "staging-api-key"

---
apiVersion: v1
kind: Secret
metadata:
  name: grayfsm-secrets-prod
  namespace: grayfsm
  labels:
    app: grayfsm
    environment: production
type: Opaque
stringData:
  DATABASE_URL: "postgresql+asyncpg://grayfsm:PROD_PASSWORD@postgres.prod.internal:5432/grayfsm"
  REDIS_URL: "redis://:PROD_REDIS_PASSWORD@redis.prod.internal:6379/0"
  SENTRY_DSN: "https://prod-sentry-key@o0.ingest.sentry.io/prod-id"
  JWT_SECRET_KEY: "prod-jwt-secret-key-from-vault"
  API_KEY: "prod-api-key-from-vault"

