---
# Service that routes traffic to active slot
apiVersion: v1
kind: Service
metadata:
  name: grayfsm-backend
  namespace: grayfsm
  labels:
    app: grayfsm
    component: backend
spec:
  type: ClusterIP
  selector:
    app: grayfsm
    component: backend
    slot: blue
  ports:
  - name: http
    port: 8000
    targetPort: http
    protocol: TCP
  sessionAffinity: None

---
# Service for monitoring blue slot
apiVersion: v1
kind: Service
metadata:
  name: grayfsm-backend-blue
  namespace: grayfsm
  labels:
    app: grayfsm
    component: backend
    slot: blue
spec:
  type: ClusterIP
  selector:
    app: grayfsm
    component: backend
    slot: blue
  ports:
  - name: http
    port: 8000
    targetPort: http
    protocol: TCP

---
# Service for monitoring green slot
apiVersion: v1
kind: Service
metadata:
  name: grayfsm-backend-green
  namespace: grayfsm
  labels:
    app: grayfsm
    component: backend
    slot: green
spec:
  type: ClusterIP
  selector:
    app: grayfsm
    component: backend
    slot: green
  ports:
  - name: http
    port: 8000
    targetPort: http
    protocol: TCP

---
# PodDisruptionBudget to maintain availability during node maintenance
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: grayfsm-backend-pdb
  namespace: grayfsm
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: grayfsm
      component: backend

---
# ServiceAccount for backend pods
apiVersion: v1
kind: ServiceAccount
metadata:
  name: grayfsm-backend
  namespace: grayfsm
  labels:
    app: grayfsm
    component: backend

---
# Role for backend pods
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: grayfsm-backend
  namespace: grayfsm
spec:
  rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "watch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]

---
# RoleBinding for backend
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: grayfsm-backend
  namespace: grayfsm
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: grayfsm-backend
subjects:
- kind: ServiceAccount
  name: grayfsm-backend
  namespace: grayfsm
