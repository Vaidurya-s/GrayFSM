---
apiVersion: v1
kind: Namespace
metadata:
  name: grayfsm
  labels:
    name: grayfsm
    managed-by: terraform

---
apiVersion: v1
kind: Namespace
metadata:
  name: grayfsm-monitoring
  labels:
    name: grayfsm-monitoring
    managed-by: terraform

---
# Network Policy for namespace isolation
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: grayfsm-default-deny
  namespace: grayfsm
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress

---
# Allow DNS egress for all pods
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: grayfsm-allow-dns
  namespace: grayfsm
spec:
  podSelector: {}
  policyTypes:
  - Egress
  egress:
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: UDP
      port: 53
