---
# Ingress for exposing services
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grayfsm-ingress
  namespace: grayfsm
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://grayfsm.example.com"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - grayfsm.example.com
    - api.grayfsm.example.com
    secretName: grayfsm-tls
  rules:
  - host: grayfsm.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: grayfsm-frontend
            port:
              number: 80
  - host: api.grayfsm.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: grayfsm-backend
            port:
              number: 8000

---
# ClusterIssuer for Let's Encrypt (requires cert-manager)
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: admin@grayfsm.example.com
    privateKeySecretRef:
      name: letsencrypt-prod
    solvers:
    - http01:
        ingress:
          class: nginx
    - dns01:
        cloudflare:
          email: admin@grayfsm.example.com
          apiTokenSecretRef:
            name: cloudflare-api-token
            key: api-token

---
# Staging ClusterIssuer for testing
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: admin@grayfsm.example.com
    privateKeySecretRef:
      name: letsencrypt-staging
    solvers:
    - http01:
        ingress:
          class: nginx
