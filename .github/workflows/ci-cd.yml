name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
      - staging
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'database/**'
      - 'infrastructure/**'
      - '.github/workflows/**'
  pull_request:
    branches:
      - main
      - develop
      - staging
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'database/**'
      - 'infrastructure/**'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: vaidurya-s/grayfsm

jobs:
  # Code Quality & Security Scanning
  security-scan:
    name: Security & Code Quality Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        continue-on-error: true
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Run dependency check
        uses: dependency-check/Dependency-Check_Action@main
        continue-on-error: true
        with:
          path: '.'
          format: 'JSON'

  # Backend Testing & Quality
  backend-test:
    name: Backend Tests & Quality Checks
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: grayfsm
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: grayfsm_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install -r tests/requirements-test.txt
          pip install pytest-cov

      - name: Install HDL toolchains (iverilog + ghdl)
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends iverilog ghdl

      - name: Run linting (ruff)
        # Replaces the previous dual flake8 invocation. Ruff is configured
        # via backend/pyproject.toml — change rules there, not here.
        run: |
          cd backend
          ruff check app
          ruff format --check app

      - name: Run type checking (mypy)
        # NOTE: `|| true` kept for now — making mypy strict surfaces ~50
        # pre-existing type issues. Tracked for a dedicated mypy-cleanup
        # PR; not part of the lint-tightening scope.
        run: mypy backend/app --ignore-missing-imports || true

      - name: Run unit tests with coverage
        env:
          DATABASE_URL: postgresql+asyncpg://grayfsm:testpass@localhost:5432/grayfsm_test
          REDIS_URL: redis://localhost:6379/0
          ENVIRONMENT: test
        run: |
          cd backend
          pytest tests/test_core/ \
            --cov=app/core \
            --cov-report=xml \
            --cov-report=html \
            --cov-fail-under=80 \
            --verbose

      - name: Run HDL round-trip tests
        run: |
          cd backend
          pytest tests/integration/test_hdl_roundtrip.py -v

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./backend/coverage.xml
          flags: backend
          fail_ci_if_error: false

      - name: Archive code coverage results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-report
          path: backend/htmlcov

  # Frontend Testing & Quality
  frontend-test:
    name: Frontend Tests & Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Run linting
        # --max-warnings 3 grandfathers the three react-refresh stylistic
        # warnings in CommandPalette.tsx, Toast.tsx, ThemeProvider.tsx —
        # each exports both a component and a hook/context. Splitting them
        # is a small follow-up; failing on any new warning is the goal.
        run: cd frontend && npx eslint src --ext .ts,.tsx --max-warnings 3

      - name: Run type checking
        run: cd frontend && npx tsc --noEmit

      - name: Run tests
        run: cd frontend && npx vitest run

      - name: Archive test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage-report
          path: frontend/coverage

  # Docker Build - Backend
  build-backend:
    name: Build Backend Docker Image
    runs-on: ubuntu-latest
    needs: [backend-test]
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./infrastructure/docker/backend.Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # cache-from/cache-to require ghcr.io auth, and the login step
          # only runs on push events. On pull_request events, skip the
          # registry cache to avoid a 403 when pushing the buildcache layer.
          cache-from: ${{ github.event_name == 'push' && format('type=registry,ref={0}/{1}-backend:buildcache', env.REGISTRY, env.IMAGE_NAME) || '' }}
          cache-to: ${{ github.event_name == 'push' && format('type=registry,ref={0}/{1}-backend:buildcache,mode=max', env.REGISTRY, env.IMAGE_NAME) || '' }}

  # Docker Build - Frontend
  build-frontend:
    name: Build Frontend Docker Image
    runs-on: ubuntu-latest
    needs: [frontend-test]
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./infrastructure/docker/frontend.Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # See backend image step for rationale: skip registry cache on
          # PR events to avoid auth failures.
          cache-from: ${{ github.event_name == 'push' && format('type=registry,ref={0}/{1}-frontend:buildcache', env.REGISTRY, env.IMAGE_NAME) || '' }}
          cache-to: ${{ github.event_name == 'push' && format('type=registry,ref={0}/{1}-frontend:buildcache,mode=max', env.REGISTRY, env.IMAGE_NAME) || '' }}

  # Deployment - Staging
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    environment:
      name: staging
      url: https://staging.grayfsm.example.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Staging
        run: |
          echo "Deploying to staging environment"
          # This will be replaced with actual deployment commands
          # For Kubernetes:
          # kubectl set image deployment/grayfsm-backend-staging backend=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:${{ github.sha }}
          # For other platforms, use appropriate deployment commands

      - name: Run integration tests
        run: |
          echo "Running integration tests against staging"
          # Add integration test commands here

      - name: Slack notification
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: 'Staging deployment ${{ job.status }}'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}

  # Deployment - Production
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://grayfsm.example.com
    permissions:
      contents: write
      deployments: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create deployment
        uses: actions/github-script@v7
        id: deployment
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: 'production',
              required_contexts: [],
              auto_merge: false
            });
            return deployment.data.id;

      - name: Deploy to Production (Blue-Green)
        run: |
          echo "Deploying to production using blue-green strategy"
          # Replace with actual blue-green deployment script
          # Example: ./infrastructure/scripts/deploy-blue-green.sh

      - name: Wait for deployment health checks
        run: |
          echo "Waiting for deployment health checks"
          # Add health check script

      - name: Update deployment status
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ steps.deployment.outputs.result }},
              state: '${{ job.status }}',
              environment_url: 'https://grayfsm.example.com',
              description: 'Production deployment ${{ job.status }}'
            });

      - name: Notify team
        if: always()
        continue-on-error: true
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: |
            Production deployment ${{ job.status }}
            Commit: ${{ github.sha }}
            Author: ${{ github.actor }}
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
          fields: repo,message,commit,author

      - name: Create GitHub Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          body: Production deployment successful
          draft: false
          prerelease: false
