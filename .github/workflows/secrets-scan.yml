name: Secrets Scan

# Defense-in-depth backstop for the local pre-commit hook configured in
# .pre-commit-config.yaml. If a contributor commits without `pre-commit
# install` having been run, this workflow still catches credentials,
# API keys, and private keys before they land on a protected branch.

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]
  schedule:
    # Catch leaks added directly to a protected branch.
    - cron: '0 4 * * 1'

permissions:
  contents: read
  pull-requests: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so gitleaks can scan all commits on the PR/branch,
          # not just the merge commit.
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE is only required for org-wide deployments;
          # not needed for this single-repo setup.
