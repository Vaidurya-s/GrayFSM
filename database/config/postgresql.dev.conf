# ================================================================
# PostgreSQL Development Configuration
# Optimized for: Local development and debugging
# ================================================================

# Import base configuration
include = '/etc/postgresql/postgresql.conf'

# ----------------------------------------------------------------
# DEVELOPMENT-SPECIFIC SETTINGS
# ----------------------------------------------------------------

# More verbose logging for development
log_statement = 'all'               # Log all SQL statements
log_duration = on                   # Log query duration
log_min_duration_statement = 0      # Log all queries (no threshold)
log_error_verbosity = verbose
log_autovacuum_min_duration = 0

# Debugging
debug_print_parse = off
debug_print_rewritten = off
debug_print_plan = off
debug_pretty_print = on
log_parser_stats = off
log_planner_stats = off
log_executor_stats = off
log_statement_stats = off

# Development query optimization
auto_explain.log_min_duration = 0   # Explain all queries
auto_explain.log_nested_statements = on

# Relaxed timeouts for debugging
statement_timeout = 0               # No timeout
lock_timeout = 0                    # No timeout
idle_in_transaction_session_timeout = 0

# Less aggressive autovacuum for development
autovacuum_naptime = 5min
autovacuum_vacuum_scale_factor = 0.2

# Allow more connections for development tools
max_connections = 50

# ----------------------------------------------------------------
# NOTES
# ----------------------------------------------------------------
# This configuration is NOT suitable for production
# Use only for local development and testing
