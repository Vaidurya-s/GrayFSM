# ================================================================
# PostgreSQL Configuration for GrayFSM
# Version: PostgreSQL 15
# Optimized for: Development & Small Production Deployments
# ================================================================

# ----------------------------------------------------------------
# CONNECTION SETTINGS
# ----------------------------------------------------------------
listen_addresses = '*'
port = 5432
max_connections = 100
superuser_reserved_connections = 3

# ----------------------------------------------------------------
# MEMORY CONFIGURATION
# ----------------------------------------------------------------
# Adjust based on available RAM
# For 4GB RAM system, use these values
# For 8GB RAM, double these values
# For 16GB+ RAM, see postgresql.prod.conf

shared_buffers = 256MB              # 25% of RAM (for dedicated server)
effective_cache_size = 1GB          # 50-75% of RAM
work_mem = 16MB                     # Per query operation memory
maintenance_work_mem = 128MB        # For VACUUM, CREATE INDEX, etc.
temp_buffers = 16MB                 # Temporary table buffers

# Reduce for memory-constrained environments
max_prepared_transactions = 0
max_pred_locks_per_transaction = 64

# ----------------------------------------------------------------
# QUERY TUNING
# ----------------------------------------------------------------
# Cost-based optimizer settings
random_page_cost = 1.1              # SSD optimized (4.0 for HDD)
effective_io_concurrency = 200      # SSD optimized (2 for HDD)
seq_page_cost = 1.0

# Planner configuration
default_statistics_target = 100
constraint_exclusion = partition
cursor_tuple_fraction = 0.1
from_collapse_limit = 8
join_collapse_limit = 8

# Parallel query execution
max_parallel_workers_per_gather = 2
max_parallel_workers = 4
max_worker_processes = 4
parallel_setup_cost = 1000.0
parallel_tuple_cost = 0.1

# ----------------------------------------------------------------
# WRITE-AHEAD LOG (WAL)
# ----------------------------------------------------------------
wal_level = replica                 # minimal, replica, or logical
fsync = on                          # NEVER turn off for production!
synchronous_commit = on             # on, off, local, remote_write, remote_apply
wal_sync_method = fdatasync         # fsync, fdatasync, open_sync, etc.
full_page_writes = on               # Recover from partial page writes
wal_compression = on                # Compress full page writes
wal_log_hints = on                  # For pg_rewind
wal_buffers = 16MB                  # WAL buffer size
wal_writer_delay = 200ms
wal_writer_flush_after = 1MB

# Checkpoints
checkpoint_timeout = 10min
checkpoint_completion_target = 0.9
checkpoint_flush_after = 256kB
checkpoint_warning = 30s
max_wal_size = 2GB
min_wal_size = 1GB

# Archiving (for backups)
archive_mode = off                  # Enable for production backups
# archive_command = 'test ! -f /backups/wal/%f && cp %p /backups/wal/%f'
archive_timeout = 0

# ----------------------------------------------------------------
# REPLICATION (for future use)
# ----------------------------------------------------------------
max_wal_senders = 10
max_replication_slots = 10
wal_keep_size = 1GB
hot_standby = on
hot_standby_feedback = on
max_standby_streaming_delay = 30s

# ----------------------------------------------------------------
# LOGGING
# ----------------------------------------------------------------
# Where to log
logging_collector = on
log_directory = 'log'
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
log_file_mode = 0600
log_rotation_age = 1d
log_rotation_size = 100MB
log_truncate_on_rotation = on

# When to log
log_min_duration_statement = 1000   # Log queries slower than 1 second
log_checkpoints = on
log_connections = on
log_disconnections = on
log_duration = off
log_error_verbosity = default
log_line_prefix = '%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '
log_lock_waits = on
log_statement = 'none'              # none, ddl, mod, all
log_temp_files = 0
log_timezone = 'UTC'

# Log slow queries
auto_explain.log_min_duration = 1000
auto_explain.log_analyze = on
auto_explain.log_buffers = on
auto_explain.log_timing = on
auto_explain.log_triggers = on
auto_explain.log_verbose = on
auto_explain.log_format = 'text'

# ----------------------------------------------------------------
# STATISTICS & MONITORING
# ----------------------------------------------------------------
track_activities = on
track_counts = on
track_io_timing = on
track_functions = all
track_activity_query_size = 4096
stats_temp_directory = '/var/run/postgresql/stats_tmp'

# pg_stat_statements extension (for query analytics)
shared_preload_libraries = 'pg_stat_statements'
pg_stat_statements.max = 10000
pg_stat_statements.track = all
pg_stat_statements.track_utility = on
pg_stat_statements.track_planning = on
pg_stat_statements.save = on

# ----------------------------------------------------------------
# AUTOVACUUM
# ----------------------------------------------------------------
autovacuum = on
autovacuum_max_workers = 3
autovacuum_naptime = 1min
autovacuum_vacuum_threshold = 50
autovacuum_vacuum_scale_factor = 0.1
autovacuum_vacuum_insert_threshold = 1000
autovacuum_analyze_threshold = 50
autovacuum_analyze_scale_factor = 0.05
autovacuum_freeze_max_age = 200000000
autovacuum_multixact_freeze_max_age = 400000000
autovacuum_vacuum_cost_delay = 2ms
autovacuum_vacuum_cost_limit = 200

# ----------------------------------------------------------------
# CLIENT CONNECTION DEFAULTS
# ----------------------------------------------------------------
datestyle = 'iso, mdy'
timezone = 'UTC'
lc_messages = 'en_US.UTF-8'
lc_monetary = 'en_US.UTF-8'
lc_numeric = 'en_US.UTF-8'
lc_time = 'en_US.UTF-8'
default_text_search_config = 'pg_catalog.english'

# Statement timeout (prevent runaway queries)
statement_timeout = 60000           # 60 seconds
lock_timeout = 10000                # 10 seconds
idle_in_transaction_session_timeout = 300000  # 5 minutes

# ----------------------------------------------------------------
# RESOURCE LIMITS
# ----------------------------------------------------------------
max_files_per_process = 1000
max_locks_per_transaction = 64
max_stack_depth = 2MB

# ----------------------------------------------------------------
# SECURITY
# ----------------------------------------------------------------
password_encryption = scram-sha-256
ssl = off                           # Enable for production
# ssl_cert_file = '/path/to/server.crt'
# ssl_key_file = '/path/to/server.key'
# ssl_ca_file = '/path/to/root.crt'

# Row-level security
row_security = on

# ----------------------------------------------------------------
# EXTENSIONS
# ----------------------------------------------------------------
# Load extensions automatically
# Extensions loaded via init scripts:
# - uuid-ossp
# - pgcrypto
# - pg_trgm
# - pg_stat_statements

# ----------------------------------------------------------------
# JSONB OPTIMIZATION
# ----------------------------------------------------------------
# GIN index configuration for JSONB
gin_pending_list_limit = 4MB

# ----------------------------------------------------------------
# FULL-TEXT SEARCH
# ----------------------------------------------------------------
default_text_search_config = 'pg_catalog.english'

# ----------------------------------------------------------------
# BACKGROUND WRITER
# ----------------------------------------------------------------
bgwriter_delay = 200ms
bgwriter_lru_maxpages = 100
bgwriter_lru_multiplier = 2.0
bgwriter_flush_after = 512kB

# ----------------------------------------------------------------
# ADVANCED OPTIONS
# ----------------------------------------------------------------
enable_partitionwise_join = on
enable_partitionwise_aggregate = on
jit = on
jit_above_cost = 100000
jit_inline_above_cost = 500000
jit_optimize_above_cost = 500000
