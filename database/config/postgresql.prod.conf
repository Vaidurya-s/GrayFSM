# ================================================================
# PostgreSQL Production Configuration
# Optimized for: High-performance production deployment
# Server Specs: 16GB RAM, 4 CPU cores, SSD storage
# ================================================================

# Import base configuration
include = '/etc/postgresql/postgresql.conf'

# ----------------------------------------------------------------
# CONNECTION SETTINGS
# ----------------------------------------------------------------
max_connections = 200
superuser_reserved_connections = 5

# ----------------------------------------------------------------
# MEMORY CONFIGURATION (for 16GB RAM server)
# ----------------------------------------------------------------
shared_buffers = 4GB                # 25% of RAM
effective_cache_size = 12GB         # 75% of RAM
work_mem = 32MB                     # Increased for complex queries
maintenance_work_mem = 512MB        # For faster maintenance operations
temp_buffers = 32MB

# ----------------------------------------------------------------
# QUERY TUNING (Production optimized)
# ----------------------------------------------------------------
random_page_cost = 1.1              # SSD optimized
effective_io_concurrency = 200      # SSD optimized
max_parallel_workers_per_gather = 4
max_parallel_workers = 8
max_worker_processes = 8

# ----------------------------------------------------------------
# WAL CONFIGURATION (for durability and performance)
# ----------------------------------------------------------------
wal_level = replica
wal_buffers = 32MB
wal_writer_delay = 200ms
max_wal_size = 4GB
min_wal_size = 2GB
checkpoint_timeout = 15min
checkpoint_completion_target = 0.9

# Enable WAL archiving for backups
archive_mode = on
archive_command = 'test ! -f /backups/wal/%f && cp %p /backups/wal/%f'
archive_timeout = 3600              # Archive every hour

# ----------------------------------------------------------------
# REPLICATION (if using hot standby)
# ----------------------------------------------------------------
max_wal_senders = 10
wal_keep_size = 2GB
synchronous_commit = on             # For data safety
synchronous_standby_names = ''      # Configure if using sync replication

# ----------------------------------------------------------------
# LOGGING (Production - less verbose)
# ----------------------------------------------------------------
log_min_duration_statement = 1000   # Log queries > 1 second
log_statement = 'ddl'               # Log only DDL statements
log_duration = off                  # Don't log all durations
log_error_verbosity = default
log_connections = on
log_disconnections = on
log_checkpoints = on
log_lock_waits = on
log_temp_files = 0

# Auto-explain for slow queries
auto_explain.log_min_duration = 5000
auto_explain.log_analyze = on
auto_explain.log_buffers = on

# ----------------------------------------------------------------
# AUTOVACUUM (Aggressive for production)
# ----------------------------------------------------------------
autovacuum = on
autovacuum_max_workers = 4
autovacuum_naptime = 30s
autovacuum_vacuum_scale_factor = 0.05
autovacuum_analyze_scale_factor = 0.02
autovacuum_vacuum_cost_delay = 1ms
autovacuum_vacuum_cost_limit = 400

# ----------------------------------------------------------------
# SECURITY (Production hardening)
# ----------------------------------------------------------------
ssl = on
ssl_cert_file = '/path/to/server.crt'
ssl_key_file = '/path/to/server.key'
ssl_ca_file = '/path/to/root.crt'
ssl_min_protocol_version = 'TLSv1.2'
password_encryption = scram-sha-256

# Timeouts for production safety
statement_timeout = 30000           # 30 seconds
lock_timeout = 5000                 # 5 seconds
idle_in_transaction_session_timeout = 600000  # 10 minutes

# ----------------------------------------------------------------
# MONITORING
# ----------------------------------------------------------------
shared_preload_libraries = 'pg_stat_statements,auto_explain'
track_activities = on
track_counts = on
track_io_timing = on
track_functions = all
pg_stat_statements.max = 10000
pg_stat_statements.track = all

# ----------------------------------------------------------------
# BACKGROUND WRITER (Production tuning)
# ----------------------------------------------------------------
bgwriter_delay = 100ms
bgwriter_lru_maxpages = 200
bgwriter_lru_multiplier = 4.0
bgwriter_flush_after = 512kB

# ----------------------------------------------------------------
# JIT COMPILATION
# ----------------------------------------------------------------
jit = on
jit_above_cost = 100000
jit_inline_above_cost = 500000
jit_optimize_above_cost = 500000

# ----------------------------------------------------------------
# CONNECTION POOLING RECOMMENDATIONS
# ----------------------------------------------------------------
# For production, use pgBouncer or similar connection pooler
# This configuration assumes connection pooling at application level
# Configure your connection pool:
# - Pool size: 20-40 connections per application instance
# - Max overflow: 10 connections
# - Pool recycle: 3600 seconds
# - Pool pre-ping: true
