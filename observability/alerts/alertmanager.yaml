---
# AlertManager Configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: grayfsm-monitoring
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m
      slack_api_url: '${SLACK_WEBHOOK_URL}'
      pagerduty_url: 'https://events.pagerduty.com/v2/enqueue'

    # Template files
    templates:
      - '/etc/alertmanager/templates/*.tmpl'

    # Root route
    route:
      receiver: 'default'
      group_by: ['alertname', 'cluster', 'service']
      group_wait: 10s
      group_interval: 10s
      repeat_interval: 12h

      # Critical alerts to PagerDuty
      routes:
      - match:
          severity: critical
        receiver: 'pagerduty'
        group_wait: 5s
        group_interval: 5s
        repeat_interval: 1h

      # Warning alerts to Slack
      - match:
          severity: warning
        receiver: 'slack-warnings'
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 4h

      # Info alerts only in logs
      - match:
          severity: info
        receiver: 'null'

    # Receivers
    receivers:
    # Default receiver - Slack general
    - name: 'default'
      slack_configs:
      - channel: '#alerts'
        title: 'Alert: {{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
        send_resolved: true
        color: '{{ if eq .Status "firing" }}danger{{ else }}good{{ end }}'

    # Critical alerts to PagerDuty and Slack
    - name: 'pagerduty'
      slack_configs:
      - channel: '#alerts-critical'
        title: 'CRITICAL: {{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
        send_resolved: true
        color: 'danger'
      pagerduty_configs:
      - routing_key: '${PAGERDUTY_KEY}'
        description: '{{ .GroupLabels.alertname }}'
        details:
          firing: '{{ range .Alerts.Firing }}{{ .Labels.instance }} {{ end }}'

    # Warning alerts to Slack
    - name: 'slack-warnings'
      slack_configs:
      - channel: '#alerts-warnings'
        title: 'Warning: {{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
        send_resolved: true
        color: 'warning'

    # Null receiver for filtered alerts
    - name: 'null'

    # Inhibition rules
    inhibit_rules:
    # Inhibit warning if critical exists
    - source_match:
        severity: 'critical'
      target_match:
        severity: 'warning'
      equal: ['alertname', 'dev', 'instance']

    # Inhibit info if warning exists
    - source_match:
        severity: 'warning'
      target_match:
        severity: 'info'
      equal: ['alertname', 'dev', 'instance']

  notification-template.tmpl: |
    {{ define "slack.default.title" -}}
    [{{ .Status | toUpper -}}
    {{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{- end -}}
    ] {{ .CommonLabels.alertname }}
    {{- end }}

    {{ define "slack.default.text" -}}
    {{ range .Alerts -}}
    *Alert:* {{ .Labels.alertname }} - `{{ .Labels.severity }}`
    *Description:* {{ .Annotations.description }}
    *Details:*
      {{ range .Labels.SortedPairs -}}
      • *{{ .Name }}:* `{{ .Value }}`
      {{ end }}
    {{ end }}
    {{- end }}

---
# AlertManager Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager
  namespace: grayfsm-monitoring
  labels:
    app: alertmanager
spec:
  replicas: 2
  selector:
    matchLabels:
      app: alertmanager
  template:
    metadata:
      labels:
        app: alertmanager
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9093"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534

      serviceAccountName: alertmanager

      containers:
      - name: alertmanager
        image: prom/alertmanager:latest
        args:
          - '--config.file=/etc/alertmanager/alertmanager.yml'
          - '--storage.path=/alertmanager'
          - '--web.external-url=/alertmanager/'

        env:
        - name: SLACK_WEBHOOK_URL
          valueFrom:
            secretKeyRef:
              name: alertmanager-secrets
              key: slack-webhook
              optional: true
        - name: PAGERDUTY_KEY
          valueFrom:
            secretKeyRef:
              name: alertmanager-secrets
              key: pagerduty-key
              optional: true

        ports:
        - containerPort: 9093
          name: web
          protocol: TCP

        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"

        livenessProbe:
          httpGet:
            path: /-/healthy
            port: 9093
          initialDelaySeconds: 5
          periodSeconds: 15

        readinessProbe:
          httpGet:
            path: /-/ready
            port: 9093
          initialDelaySeconds: 5
          periodSeconds: 5

        volumeMounts:
        - name: config
          mountPath: /etc/alertmanager
        - name: storage
          mountPath: /alertmanager

      volumes:
      - name: config
        configMap:
          name: alertmanager-config
      - name: storage
        emptyDir: {}

---
# AlertManager Service
apiVersion: v1
kind: Service
metadata:
  name: alertmanager
  namespace: grayfsm-monitoring
  labels:
    app: alertmanager
spec:
  type: ClusterIP
  selector:
    app: alertmanager
  ports:
  - port: 9093
    targetPort: web
    protocol: TCP

---
# AlertManager ServiceAccount
apiVersion: v1
kind: ServiceAccount
metadata:
  name: alertmanager
  namespace: grayfsm-monitoring

---
# AlertManager Secrets
apiVersion: v1
kind: Secret
metadata:
  name: alertmanager-secrets
  namespace: grayfsm-monitoring
type: Opaque
stringData:
  slack-webhook: "https://hooks.slack.com/services/YOUR/WEBHOOK/URL"
  pagerduty-key: "YOUR_PAGERDUTY_KEY"
